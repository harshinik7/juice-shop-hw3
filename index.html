<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juice Shop Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #16213e;
      padding: 40px 36px;
      border-radius: 8px;
      width: 360px;
      color: #e0e0e0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .card h2 { text-align: center; color: #f5a623; margin-bottom: 6px; }
    .card p.subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 24px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #aaa; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; margin-bottom: 6px;
      border: 1px solid #333; border-radius: 4px;
      background: #0f3460; color: #fff; font-size: 14px;
      outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #f5a623; }
    .error { color: #e74c3c; font-size: 12px; margin-bottom: 10px; min-height: 16px; }
    button[type="submit"] {
      width: 100%; padding: 11px; background: #f5a623;
      color: #1a1a2e; font-weight: bold; font-size: 15px;
      border: none; border-radius: 4px; cursor: pointer;
      margin-top: 8px; transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #e0951a; }
    .success { display: none; text-align: center; color: #2ecc71; margin-top: 14px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Juice Shop</h2>
    <p class="subtitle">Please sign in to continue</p>
    <form id="loginForm" novalidate>
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="user@example.com" autocomplete="username" />
      <div class="error" id="emailError"></div>
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="current-password" />
      <div class="error" id="passwordError"></div>
      <button type="submit">Login</button>
    </form>
    <div class="success" id="successMsg">Login successful!</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const successMsg = document.getElementById('successMsg');

    // XSS prevention: encode HTML entities before any output
    function sanitize(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function validateEmail(email) {
      if (!email) return 'Email is required.';
      if (!email.includes('@')) return 'Email must contain "@".';
      const parts = email.split('@');
      if (!parts[0] || !parts[1]) return 'Please enter a valid email address.';
      return '';
    }

    function validatePassword(password) {
      if (!password) return 'Password is required.';
      if (password.length < 8) return 'Password must be at least 8 characters.';
      return '';
    }

    emailInput.addEventListener('blur', () => {
      emailError.textContent = validateEmail(emailInput.value.trim());
    });

    passwordInput.addEventListener('blur', () => {
      passwordError.textContent = validatePassword(passwordInput.value);
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      successMsg.style.display = 'none';
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const eErr = validateEmail(email);
      const pErr = validatePassword(password);
      emailError.textContent = eErr;
      passwordError.textContent = pErr;
      if (eErr || pErr) return;
      // Sanitize before any DOM use
      const safeEmail = sanitize(email);
      console.log('Login attempt for:', safeEmail);
      // Server-side: POST /api/login with CSRF token, rate limiting, bcrypt comparison
      successMsg.style.display = 'block';
    });
  </script>
</body>
</html>
